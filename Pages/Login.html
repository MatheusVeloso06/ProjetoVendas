<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Tela de Login</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <style>

    body{
      background-color: black;
      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      font-family: Arial, Helvetica, sans-serif;
    }

    .login-box{
      width: 400px;
      text-align: center;
    }

    .login-img{
      width: 260px;
      margin-bottom: 50px;
    }

    .form-control{

      background-color: white;

      border: none;

      border-radius: 35px;

      height: 60px;

      margin-bottom: 25px;

      padding-left: 25px;

      font-size: 22px;

      color: black;
    }

    .form-control::placeholder{
      color: black;
    }

    .form-control:focus{

      background-color: white;

      box-shadow: none;
    }

    .buttons{

      display: flex;

      justify-content: space-between;

      margin-top: 60px;
    }

    .btn-custom{

      background-color: #6ea1f2;

      border: none;

      border-radius: 20px;

      width: 170px;

      height: 55px;

      font-size: 22px;

      color: black;

      transition: 0.3s;
    }

    .btn-custom:hover{

      background-color: #8cb6ff;
    }

  </style>

</head>

<body>

  <div class="login-box">

    <!-- IMAGEM -->
    <img
      src="https://cdn-icons-png.flaticon.com/512/6195/6195700.png"
      class="login-img"
    >

    <!-- EMAIL -->
    <input
      type="email"
      class="form-control"
      placeholder="EMAIL"
    >

    <!-- SENHA -->
    <input
      type="password"
      class="form-control"
      placeholder="SENHA"
    >

    <!-- BOTÕES -->
<div class="buttons">

 <a href="TelaHome.html" class="btn btn-custom">
  ENTRAR
</a>

  <a href="cadastro.html" class="btn btn-custom">
    CADASTRE-SE
  </a>

</div>

  </div>

</body>

</html>
