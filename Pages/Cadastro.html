
<!-- cadastro.html -->
<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cadastro</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="cadastro.css">

</head>

<body>

  <nav class="navbar navbar-dark navbar-custom">

    <div class="container-fluid">

      <span class="navbar-brand">
        Tela de Cadastro
      </span>

    </div>

  </nav>

  <div class="container cadastro-container">

    <div class="cadastro-card">

      <h1 class="mb-4">
        Cadastro de Cliente
      </h1>

      <table class="table">

        <tr>

          <td>

            <form action="../php/InsertUsuario.php" method="POST">

              <div class="mb-3">

                <label class="form-label">
                  Nome
                </label>

                <input
                  type="text"
                  name="NomeCompleto"
                  class="form-control"
                  placeholder="Digite o nome"
                  required
                >

              </div>

              <div class="mb-3">

                <label class="form-label">
                  Email
                </label>

                <input
                  type="email"
                  name="email"
                  class="form-control"
                  placeholder="Digite o email"
                  required
                >

              </div>

              <div class="mb-3">

                <label class="form-label">
                  Senha
                </label>

                <input
                  type="text"
                  name="Senha"
                  class="form-control"
                  placeholder="Digite a senha"
                  required
                >

              </div>

<div class="mb-3">

                <label class="form-label">
                  Confirmar Senha
                </label>

                <input
                  type="text"
                  name="ConfirmarSenha"
                  class="form-control"
                  placeholder="Digite a senha"
                  required
                >

              </div>



              <button type="submit" class="btn cadastro-btn">
                Salvar Cadastro
              </button>

            </form>

          </td>

        </tr>

      </table>

    </div>

  </div>

</body>

</html>
